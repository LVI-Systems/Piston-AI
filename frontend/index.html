<!DOCTYPE html>
<html>
    <head>
        <style>

            .globe-blur {
                width: 100vw;
                height: 100vh;
                
                filter: blur(10px);
            }

            .globe-container {
                position: absolute;
                width: 200px;
                height: 200px;
                border-radius: 50%;
                background: #00000000;
                transition: transform 0.1s ease-out;
                transform-origin: center center;
                overflow: hidden;

                transition: transform 0.5s ease-out;
            }

            .globe-layer {
                position: absolute;
                width: 120px;
                height: 120px;
                border-radius: 50%;

                mix-blend-mode: screen;
                opacity: 0.8;

                filter: blur(30px);
                transition: transform 0.5s ease;
            }

            .red-glow {
                top: -10px;
                left: -10px;

                background-color: rgb(255, 56, 56) ;

            }

            .blue-glow {
                top: -10px;
                right: -10px;

                background-color: rgb(56, 152, 255) ;

            }

            .green-glow {
                bottom: -10px;
                left: 50%;
                transform: translateX(-50%);

                background-color: rgb(56, 255, 89) ;
            }

            .middle-glow {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);

                background-color: rgb(255, 255, 255);
            }
        </style>
    </head>
    <body>
        <div class="globe-blur">
            <div class="globe-container" id="globe-container">
                <div class="globe-layer red-glow"></div>
                <div class="globe-layer blue-glow"></div>
                <div class="globe-layer green-glow"></div>
                <div class="globe-layer middle-glow"></div>
            </div>
        </div>
        <script>
            async function rotateGlobe(degrees) {
                const globeContainer = document.getElementById("globe-container");
                let currentDegree = 0;

                function animate() {
                    currentDegree += degrees;
                    globeContainer.style.transform = `rotate(${currentDegree}deg)`;

                    requestAnimationFrame(animate)
                }

                animate()
            }

            async function changePosition() {
                const layers = document.querySelector(".globe-layer");

                function animate() {
                    layers.array.forEach(element => {
                        element.style.transform = `translate(20px)`;
                    });
                    layers.array.forEach(element => {
                        element.style.transform = `translate(-20px)`;
                    });
                    requestAnimationFrame(animate);
                }
            }

            function positionGlobe() {
                const globeContainer = document.getElementById("globe-container");
                globeContainer.style.top = ( window.innerHeight - globeContainer.getBoundingClientRect().height ) / 2 + 'px';
                globeContainer.style.left = ( window.innerWidth - globeContainer.getBoundingClientRect().width ) / 2 + 'px';

            }
            
            function initApp() {
                rotateGlobe(1);
                positionGlobe();
                changePosition()
            }

            initApp()
        </script>
    </body>
</html>
